<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>one-line blog</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=DotGothic16&family=IBM+Plex+Serif:wght@300&display=swap" rel="stylesheet">

<style>
body{
  background:#0f0b12;
  color:#ffd6e7;
  font-family:"IBM Plex Serif", serif;
  max-width:700px;
  margin:auto;
  padding:60px 20px;
  line-height:1.8;
}

h1{
  font-family:"DotGothic16", sans-serif;
  text-align:center;
  margin-bottom:8px;
  color:#fff0f7;
}

.subtitle{
  text-align:center;
  color:#d8a8bc;
  opacity:.9;
  margin-bottom:55px;
  font-size:1rem;
}

.entry{
  margin-bottom:38px;
}

.date{
  font-size:.85rem;
  color:#d8a8bc;
  margin-bottom:8px;
}

.text{
  font-size:1.2rem;
  color:#ffe3ef;
}

.divider{
  text-align:center;
  color:#d8a8bc;
  opacity:.45;
  margin:34px 0;
  letter-spacing:6px;
}

a{
  color:#ffbfd8;
  text-decoration:none;
}

a:hover{
  color:#fff0f7;
}

.back{
  text-align:center;
  margin-top:70px;
  opacity:.75;
}

::selection{
  background:#ffbfd8;
  color:#111;
}
</style>
</head>

<body>

<h1>one-line blog</h1>
<div class="subtitle">small thoughts.</div>

<div class="entry">
<div class="date">July 5, 2026</div>
<div class="text">
today i am inspired and tired and can't believe it's already 7pm. psh
</div>
</div>

<div class="divider">· · ·</div>

<div class="back">
  <a href="../index.html">← return to the portals</a>
</div>

</body>
</html>
