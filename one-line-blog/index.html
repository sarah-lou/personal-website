<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>one-line blog</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=DotGothic16&family=IBM+Plex+Serif:wght@300&display=swap" rel="stylesheet">

<style>

body{
    background:#fff9fc;
    color:#2c1d3f;
    font-family:"IBM Plex Serif", serif;
    max-width:700px;
    margin:auto;
    padding:60px 20px;
    line-height:1.8;
}

h1{
    font-family:"DotGothic16", sans-serif;
    text-align:center;
    margin-bottom:50px;
}

.entry{
    margin-bottom:45px;
}

.date{
    font-size:.85rem;
    opacity:.55;
    margin-bottom:8px;
}

.text{
    font-size:1.2rem;
}

hr{
    border:none;
    border-top:1px solid #eee;
    margin-top:40px;
}

a{
    color:inherit;
}

.back{
    text-align:center;
    margin-top:70px;
}

</style>
</head>

<body>

<h1>one-line blog ✿</h1>

<div class="entry">
<div class="date">July 5, 2026</div>
<div class="text">
today i am inspired and tired and can't believe it's already 7pm. psh
</div>
</div>

<hr>

<div class="back">
<a href="../index.html">← return to the portals</a>
</div>

</body>
</html>
