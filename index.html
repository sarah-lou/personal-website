<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>choose your portal ✨</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DotGothic16&family=IBM+Plex+Serif:wght@100;300&display=swap" rel="stylesheet">

  <link rel="icon" type="image/png" href="helloKitty.png">

<style>
:root{
  --ink:#2c1d3f;
  --pink:#ffd1dc; --blue:#cfe5ff; --lav:#e5c7ff;
  --glow1:#ffb7d6; --glow2:#c9d8ff; --glow3:#e8c7ff;
}

/* dreamy cloudy bg */
body{
  margin:0; min-height:100svh; color:var(--ink);
  font-family:"IBM Plex Serif",serif; display:grid; place-items:center; overflow-x:hidden; overflow-y: auto;
  background:
    radial-gradient(1100px 800px at 10% 10%, var(--pink), transparent 60%),
    radial-gradient(900px 900px at 90% 30%, var(--blue), transparent 55%),
    radial-gradient(1100px 900px at 50% 110%, var(--lav), transparent 55%),
    #ffeef7;
  background-attachment:fixed;
}

/* header */
header{ text-align:center; margin-top:min(8vh,60px); padding:0 16px; }
h1{ font-family:"DotGothic16",sans-serif; font-size:clamp(1.6rem,4vw,2.8rem); letter-spacing:.5px; margin:.2rem 0;}
.sub{ opacity:.8; }

/* portals grid */
.main{
  width:min(1000px,92%);
  margin: min(4vh,30px) auto;
  display:grid;
  grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
  gap:18px;
  place-items: stretch;
}

/* NEW: portal cards instead of bubbles */
.portal{
  position:relative;
  display:flex;
  align-items:center;
  justify-content:center;
  text-decoration:none;
  color:var(--ink);
  padding:22px 18px;
  border-radius:22px;
  min-height:120px;

  background:
    radial-gradient(circle at 20% 30%, #ffffffcc 0 18%, transparent 45%),
    radial-gradient(circle at 80% 70%, #ffffffaa 0 16%, transparent 45%),
    linear-gradient(135deg, var(--glow1), var(--glow2) 60%, var(--glow3));

  box-shadow:
    0 10px 25px rgba(46, 20, 68,.16),
    inset 0 1px 10px #ffffffaa;

  transition: transform .25s ease, filter .25s ease, box-shadow .25s ease;
  isolation:isolate;
  overflow:hidden;
}

/* animated “portal shimmer ring” */
.portal::before{
  content:"";
  position:absolute;
  inset:-40%;
  background: conic-gradient(from 180deg, #ffffff00, #ffffff88, #ffffff00 60%);
  filter: blur(2px);
  opacity:.55;
  animation: spin 8s linear infinite;
}

@keyframes spin { to { transform: rotate(360deg); } }

.portal:hover{
  transform: translateY(-3px) scale(1.01);
  filter:saturate(1.06);
  box-shadow: 0 16px 40px rgba(46,20,68,.22), inset 0 1px 12px #ffffffdd;
}

.portal:focus-visible{ outline:3px solid #fff; outline-offset:4px; }

.portal.garden { --glow1:#ffd1dc; --glow2:#cfe5ff; --glow3:#e5c7ff; }
.portal.blog   { --glow1:#cfe5ff; --glow2:#e5c7ff; --glow3:#ffd1dc; }
.portal.lift   { --glow1:#e5c7ff; --glow2:#ffd1dc; --glow3:#cfe5ff; }

.portal:active{
  transform: translateY(-1px) scale(0.99);
}

/* label can be a bit larger now */
.label{
  position:relative;
  z-index:2;
  text-align:center;
  padding:14px 18px;
  border-radius:18px;
  background:#ffffffc9;
  backdrop-filter: blur(3px);
  font-family:"DotGothic16",sans-serif;
  font-size:clamp(1.05rem,1.4vw,1.35rem);
  box-shadow:0 6px 18px rgba(46,20,68,.18);
}

/* tiny caption */
footer{ position:fixed; bottom:14px; width:100%; text-align:center; opacity:.7; font-size:.9rem; }

/* reduce motion */
@media (prefers-reduced-motion: reduce){
  .portal::before{ animation:none }
  .cloud{ animation:none }
  body::after{ animation:none }
}

/* ===== CLOUDS + SPARKLES PATCH (place at end of <style>) ===== */

/* stacking order */
.content { position: relative; z-index: 4; }   /* header/main/footer */
.cloud   { position: fixed; z-index: 1; }      /* behind content, above bg */
body::after { z-index: 2; }                    /* sparkles layer */
body::before{ z-index: 3; }                    /* scanlines layer */

/* --- CLOUD LAYER --- */
.cloud {
  background: #ffffffdd;
  border-radius: 50%;
  filter: blur(18px);
  opacity: 0.55;
  animation: floatCloud 55s linear infinite;
  pointer-events: none;
}
@keyframes floatCloud {
  from { transform: translateX(-20vw); }
  to   { transform: translateX(120vw); }
}
.cloud.c1 { width:220px; height:120px; top:15%; left:-30%; animation-duration:55s; }
.cloud.c2 { width:300px; height:160px; top:42%; left:-25%; animation-duration:60s; }
.cloud.c3 { width:260px; height:140px; top:70%; left:-35%; animation-duration:65s; }

/* --- SPARKLES (over clouds) --- */
body::after {
  content:"";
  position: fixed; inset: 0;
  pointer-events: none;
  background:
    radial-gradient(3px 3px at 15% 25%, #fff8 50%, transparent 51%),
    radial-gradient(2px 2px at 60% 35%, #fff6 50%, transparent 51%),
    radial-gradient(2px 2px at 80% 70%, #fff7 50%, transparent 51%),
    radial-gradient(2.5px 2.5px at 30% 80%, #fff8 50%, transparent 51%),
    radial-gradient(1.5px 1.5px at 90% 20%, #fff6 50%, transparent 51%);
  mix-blend-mode: screen;
  animation: shimmer 8s ease-in-out infinite alternate;
}
@keyframes shimmer {
  0% { transform: translate(-4px,-3px) rotate(0deg); }
  100% { transform: translate(3px,4px) rotate(1deg); }
}

/* --- Y2K scanlines (top-most overlay) --- */
body::before {
  content:"";
  position: fixed; inset: 0;
  background: repeating-linear-gradient(
    to bottom,
    rgba(255,255,255,0.06) 0 1px,
    rgba(255,255,255,0)     1px 2px
  );
  mix-blend-mode: overlay;
  pointer-events: none;
}

</style>
</head>
<body>
  <!-- floating clouds (sit above bg, below content) -->
  <div class="cloud c1"></div>
  <div class="cloud c2"></div>
  <div class="cloud c3"></div>

  <!-- all visible content wrapped for proper z-index -->
  <div class="content">
    <header>
      <h1>⋆.˚ ☽ ⭒˚.<br>choose your portal<br>.˚⭒ ☾ ˚.⋆</h1>
      <div class="sub">• sarah • lou •</div>
    </header>

    <main class="main">
      <a class="portal lift" href="workout.html" aria-label="Enter Sarah Lifts">
        <div class="label">enter da lift portal<br>⋆˚🏋️‍♀️˖°</div>
      </a>
      <a class="portal garden" href="garden.html" aria-label="Enter the Digital Garden">
        <div class="label">enter da digital garden<br>⋆˚✿˖°</div>
      </a>
      <a class="portal blog" href="blog/index.html" aria-label="Enter the Blog">
        <div class="label">enter da blog<br>⋆.˚☁️⋆</div>
      </a>

    </main>

    <footer>ᓚ₍⑅^- .-^₎ -ᶻ 𝗓 𐰁</footer>
  </div>
</body>
</html>
